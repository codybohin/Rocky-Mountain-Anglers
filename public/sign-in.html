<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Rocky Mountain Anglers</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/rma.css">
</head>
<body>
<div id="_nav"></div>
<div class="page-wrap">

<section class="section section-dark">
  <div class="inner-xs">
    <div class="sh center" style="margin-bottom:32px">
      <p class="lbl lbl-blue">Member Access</p>
      <h1 class="d-lg" style="color:var(--snow)">Sign In</h1>
      <p>Sign in to submit catches, access your fish diary, and view your leaderboard history.</p>
    </div>
    <div style="background:var(--charcoal);border:1px solid var(--border);border-radius:8px;padding:32px">
      <div style="display:flex;flex-direction:column;gap:18px">
        <div class="form-field">
          <label class="form-label" for="siEmail">Email address</label>
          <input type="email" class="form-input" id="siEmail" placeholder="you@email.com" autocomplete="email" required>
        </div>
        <div class="form-field">
          <label class="form-label" for="siPw">Password</label>
          <input type="password" class="form-input" id="siPw" placeholder="Your password" autocomplete="current-password" required>
        </div>
        <button class="btn btn-md btn-primary btn-full" onclick="RMA_toast('Authentication launches with the full app!')">Sign In</button>
        <div style="text-align:center;font-size:13px;color:var(--silver)">
          <a href="#" style="color:var(--ice)">Forgot your password?</a>
        </div>
      </div>
      <div class="divider" style="margin:24px 0"></div>
      <p style="text-align:center;font-size:14px;color:var(--silver)">Don't have an account? <a href="/sign-up.html" style="color:var(--ice)">Create one free →</a></p>
    </div>
  </div>
</section>
</div>
<div id="_footer"></div>
<script src="/js/rma-data.js"></script>
<script>
document.getElementById('_nav').innerHTML    = RMA_Nav('');
document.getElementById('_footer').innerHTML = RMA_Footer();
RMA_initNav(false);

</script>
</body>
</html>
