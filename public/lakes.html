<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lakes Directory — Rocky Mountain Anglers</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/rma.css">
</head>
<body>
<div id="_nav"></div>
<div class="page-wrap">

<section class="section-sm section-dark">
  <div class="inner">
    <div class="sh" style="margin-bottom:24px">
      <p class="lbl lbl-blue">Water Directory</p>
      <h1 class="d-xl" style="color:var(--snow)">Find Your Lake</h1>
      <p>A growing directory of motorboat-accessible Rocky Mountain fishing lakes across 5 states. Each page includes fishing reports, species intel, local guides, and tackle recommendations.</p>
    </div>
    <!-- Search + filters -->
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px">
      <input type="text" class="form-input" id="lakeSearch" placeholder="Search lake or county..." oninput="lakesRender()" aria-label="Search lakes" style="flex:1;min-width:200px">
      <select class="form-select" style="width:auto" id="lakeStateF" onchange="lakesRender()" aria-label="Filter by state">
        <option value="">All States</option>
        <option>UT</option><option>CO</option><option>WY</option><option>MT</option><option>ID</option>
      </select>
      <select class="form-select" style="width:auto" id="lakeStatusF" onchange="lakesRender()" aria-label="Filter by status">
        <option value="">Any Status</option>
        <option value="hot">🔥 Hot</option>
        <option value="good">✓ Good</option>
        <option value="slow">⏳ Slow</option>
      </select>
    </div>
    <div class="filter-tabs" style="margin-bottom:28px" role="tablist">
      <button class="filter-tab active" data-st="" onclick="lakeTab(this)">All States</button>
      <button class="filter-tab" data-st="UT" onclick="lakeTab(this)">Utah</button>
      <button class="filter-tab" data-st="CO" onclick="lakeTab(this)">Colorado</button>
      <button class="filter-tab" data-st="WY" onclick="lakeTab(this)">Wyoming</button>
      <button class="filter-tab" data-st="MT" onclick="lakeTab(this)">Montana</button>
      <button class="filter-tab" data-st="ID" onclick="lakeTab(this)">Idaho</button>
    </div>
    <div id="lakeCount" style="font-size:13px;color:var(--silver);margin-bottom:16px"></div>
    <div class="grid-auto" id="lakesGrid"></div>
    <div id="lakesEmpty" style="display:none"><div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-title">No Lakes Found</div><div class="empty-state-body">Try clearing your filters or searching a different term.</div></div></div>
  </div>
</section>
</div>
<div id="_footer"></div>
<script src="/js/rma-data.js"></script>
<script>
document.getElementById('_nav').innerHTML    = RMA_Nav('lakes');
document.getElementById('_footer').innerHTML = RMA_Footer();
RMA_initNav(false);

function lakeTab(el) {
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('lakeStateF').value = el.dataset.st;
  lakesRender();
}
function lakesRender() {
  const q  = document.getElementById('lakeSearch').value.toLowerCase();
  const st = document.getElementById('lakeStateF').value;
  const ss = document.getElementById('lakeStatusF').value;
  let list = RMA_LAKES;
  if (q)  list = list.filter(l => l.name.toLowerCase().includes(q) || l.county.toLowerCase().includes(q));
  if (st) list = list.filter(l => l.state === st);
  if (ss) list = list.filter(l => l.status === ss);
  const grid = document.getElementById('lakesGrid');
  const empty = document.getElementById('lakesEmpty');
  document.getElementById('lakeCount').textContent = list.length + ' lake' + (list.length !== 1 ? 's' : '') + ' found';
  if (list.length === 0) { grid.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  grid.innerHTML = list.map(RMA_LakeCard).join('');
}
lakesRender();
</script>
</body>
</html>
